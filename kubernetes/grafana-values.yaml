adminUser: admin

adminPassword: admin123

service:
  type: NodePort
  nodePort: 30030

persistence:
  enabled: true
  size: 2Gi

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        isDefault: true
        url: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090