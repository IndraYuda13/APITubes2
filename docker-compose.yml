services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apitubes-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET_KEY=admin123!@#secretkeyAwokawokawok
      - DB_STORAGE=/app/data/simasu.db
    volumes:
      - sqlite_data:/app/data
    restart: always

  web:
    image: yudhapakel/simasu-web:latest
    container_name: apitubes-frontend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8000
      - API_URL=http://api:5000
    depends_on:
      - api
    restart: always

volumes:
  sqlite_data:
